name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt
        run: cargo fmt -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - name: cargo nextest (excluding check_slow)
        run: cargo nextest run --release -E 'not test(/check_slow/)'

  test-check-slow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - name: cargo nextest check_slow (excluding physics)
        run: cargo nextest run --release -E 'test(/check_slow/) and not test(/check_slow_physics/)'

  test-check-slow-physics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - name: cargo nextest check_slow_physics
        run: cargo nextest run --release -E 'test(/check_slow_physics/)'

  smc-fv-crash:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: SMC fv-crash regression sweep
        run: ./tests/smc_fv_crash_regression.sh

  cross-depth-reuse-leaf-expand:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: cross-depth-reuse-then-leaf-DB-var regression
        run: ./tests/cross_depth_reuse_then_db_var_regression.sh

  # External equivalence-oracle checks. The checker is pure Python and lives
  # under `scripts/`; it reads each fixture's `original_programs` and
  # `rewritten_programs`, inlines library lambdas, and verifies β-equivalence
  # (plus DSRs where applicable). Independent of the Rust search code, so it
  # catches abstraction bugs the unit tests don't.
  check-fixtures:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: oracle self-tests
        run: python3 scripts/test_check_equiv.py
      - name: check every expected_outputs/*.out.json
        run: python3 scripts/check_all_outputs.py

  # Enumerate data/domains/* so the matrix below stays in sync with the repo.
  list-domains:
    runs-on: ubuntu-latest
    outputs:
      domains: ${{ steps.ls.outputs.domains }}
    steps:
      - uses: actions/checkout@v4
      - id: ls
        run: |
          domains=$(ls -1 data/domains | jq -R . | jq -sc .)
          echo "domains=$domains" >> "$GITHUB_OUTPUT"

  # Run the search end-to-end (both backends) on every problem in each
  # data/domains/* corpus, then verify each rewritten corpus is equivalent
  # to the input under the same oracle. One job per domain, in parallel.
  search-and-check-domains:
    needs: list-domains
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        domain: ${{ fromJson(needs.list-domains.outputs.domains) }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: build release binary
        run: cargo build --release
      - name: search-and-check ${{ matrix.domain }}
        run: python3 scripts/search_and_check_domain.py data/domains/${{ matrix.domain }} -- --language lambda-calc --num-steps 2000

  # For each input in each domain: run best-first to discover an abstraction,
  # then re-run both backends with `--follow` on that pattern and assert each
  # reaches it. Guards against regressions where follow mode can no longer
  # reproduce the abstraction stitch itself finds.
  follow-reaches-domains:
    needs: list-domains
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        domain: ${{ fromJson(needs.list-domains.outputs.domains) }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: build release binary
        run: cargo build --release
      - name: follow-reaches ${{ matrix.domain }}
        run: python3 scripts/follow_reaches_domain.py data/domains/${{ matrix.domain }}
